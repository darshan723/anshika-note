<!DOCTYPE html>
<html>
<head>
    <title>For Anshika ❤️</title>
    <style>
        body {
            font-family: Arial;
            background: #fff0f5;
            text-align: center;
            padding: 40px;
        }
        .note {
            background: white;
            padding: 20px;
            margin: 15px;
            border-radius: 15px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            background: #ff4d88;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>💖 For My Anshika 💖</h1>

    <div class="note">
        <p>I know you're not feeling your best right now 🥺</p>
    </div>

    <div class="note">
        <p>I’m always here for you ❤️</p>
    </div>

    <div class="note">
        <p>You are strong, beautiful, and very special to me 🌸</p>
    </div>

    <div class="note">
        <p>Please take rest and don’t stress 💕</p>
    </div>

    <button onclick="showMessage()">Click for a surprise 💌</button>

    <p id="surprise"></p>

    <script>
        function showMessage() {
            document.getElementById("surprise").innerText =
            "I wish I could hug you right now 🤗❤️";
        }
    </script>

</body>
</html>
